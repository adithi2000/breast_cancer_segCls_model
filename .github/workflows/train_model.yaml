name: Train Model
on:
    workflow_dispatch:
    push:
        branches:
            - main
jobs:
    demo:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: Train the model
              run: |
                  echo "Training the model..."
                  #valid only for this step cd src/ and not for the next one, so we need to specify the working directory for each step
                  cd src/
                  ls -la
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
              working-directory: src/
            
