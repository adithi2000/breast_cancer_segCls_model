name: Predict Microservice
on:
    workflow_dispatch:
    push:
        branches:
            - densenet-test
        paths:
            - 'src/**'
            - 'Predict_Microservice/**'
    workflow_run:
        workflows: ["Train Model"]
        types:
            - completed
jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          EXPERIMENT_NAME: ${{ vars.EXPERIMENT_NAME }}
        if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: setup docker
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: create docker image
              run: |
                echo "Creating Docker image..."
                docker build \
                -t ${{ secrets.DOCKER_USERNAME }}/predict-microservice:latest \
                -f Predict_Microservice/Dockerfile .
                echo "Docker image created successfully."

            - name: push docker image
              run: |
                echo "Pushing Docker image to registry..."
                docker push ${{ secrets.DOCKER_USERNAME }}/predict-microservice:latest
                echo "Docker image pushed successfully."