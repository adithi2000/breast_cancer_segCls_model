name: Frontend Docker Build and Push
on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths:
            - 'streamlit_app/**'
            - 'Predict_Microservice/**'
    workflow_run:
        workflows: ["Predict Microservice"]
        types:
            - completed
jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: setup docker
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: create docker image
              run: |
                echo "Creating Docker image..."
                docker build -t ${{ secrets.DOCKER_USERNAME }}/streamlit-frontend:latest -f streamlit_app/Dockerfile .
                echo "Docker image created successfully."

            - name: push docker image
              run: |
                echo "Pushing Docker image to registry..."
                docker push ${{ secrets.DOCKER_USERNAME }}/streamlit-frontend:latest
                echo "Docker image pushed successfully."